name: jay_kos
description: "A new Flutter project for Jaykos room booking."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.1.0                # Untuk komunikasi dengan Servlet
  shared_preferences: ^2.2.0   # Untuk menyimpan session (username/role) secara lokal
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/